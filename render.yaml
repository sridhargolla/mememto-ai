services:
  - type: web
    name: memento-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt && mkdir -p ../models && curl -L -o ../models/qwen2.5-3b-instruct-q4_k_m.gguf https://huggingface.co/Qwen/Qwen2.5-3B-Instruct-GGUF/resolve/main/qwen2.5-3b-instruct-q4_k_m.gguf
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        value: qlBgwe2MdYKJV50F9R4mPjvXjnxKD236SkGpOZZWEF0
      - key: DATABASE_PATH
        value: ./memento.db
      - key: MODEL_PATH
        value: ../models/qwen2.5-3b-instruct-q4_k_m.gguf
      - key: N_CTX
        value: 2048
      - key: N_THREADS
        value: 4
      - key: FRONTEND_URL
        fromService:
          type: web
          name: memento-ai-frontend
          property: host

  - type: web
    name: memento-ai-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: memento-ai-backend
          property: host
