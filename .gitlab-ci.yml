stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

variables:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

# -----------------
# LINT STAGE
# -----------------

ruff-lint:
  stage: lint
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install ruff
  script:
    - ruff check .

flake8-lint:
  stage: lint
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install flake8
  script:
    - flake8 backend/

pylint-lint:
  stage: lint
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install -r backend/requirements.txt
    - pip install pylint pytest pytest-cov
  script:
    - pylint backend/

frontend-lint:
  stage: lint
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run lint || true # Allow failure if there are legacy frontend warnings

vulture-lint:
  stage: lint
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install vulture
  script:
    - vulture backend

# -----------------
# FORMAT STAGE
# -----------------

ruff-format:
  stage: format
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install ruff
  script:
    - ruff format --check .

black-format:
  stage: format
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install black
  script:
    - black --check backend/

# -----------------
# TYPE CHECK STAGE
# -----------------

mypy-typecheck:
  stage: type_check
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install mypy types-requests types-passlib pydantic fastapi sqlalchemy python-dotenv python-jose passlib bcrypt
  script:
    - mypy backend/ --ignore-missing-imports

# -----------------
# TEST STAGE
# -----------------

python-tests:
  stage: test
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install -r backend/requirements.txt
    - pip install pytest pytest-cov
  script:
    - pytest backend/

frontend-tests:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm install
  script:
    - npm test -- --coverage --watchAll=false || true

frontend-build:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

# -----------------
# COVERAGE STAGE
# -----------------

python-coverage:
  stage: coverage
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install -r backend/requirements.txt
    - pip install pytest pytest-cov
  script:
    - pytest backend/ --cov=backend --cov-report=xml:backend/coverage.xml --cov-report=term --cov-fail-under=40
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml

# -----------------
# SECURITY STAGE
# -----------------

bandit-security:
  stage: security
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install bandit
  script:
    - bandit -r backend/ --configfile pyproject.toml

pip-audit-security:
  stage: security
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install pip-audit
  script:
    - pip-audit -r backend/requirements.txt

semgrep-security:
  stage: security
  image: returntocorp/semgrep
  script:
    - semgrep scan --config auto --error --fail-on-core-errors

gitleaks-security:
  stage: security
  image:
    name: gitleaks/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --verbose --source=.
