name: memento_ai
description: Offline-first personal AI memory engine
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP requests
  http: ^1.1.0

  # Local storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0

  # State management
  provider: ^6.1.1

  # File picker for uploads
  file_picker: ^6.1.1

  # Permissions
  permission_handler: ^11.2.0

  # UI components
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
